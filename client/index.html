    <!-- Google Analytics 4 (G-DVVQ3D5M6Z) + Consent Mode v2 (design_ga4_analytics.md)。
         既定は全 denied（広告系は不使用）。analytics_storage は Cookie 同意で granted に更新。
         denied 時は Cookie なしの匿名 ping で訪問者全体のファネルを計測する。 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DVVQ3D5M6Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('consent', 'default', {
        ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied',
        analytics_storage: 'denied', wait_for_update: 500
      });
      // 既に Cookie 同意済みなら即 granted（起動時同期）
      try {
        var c = JSON.parse(localStorage.getItem('yah_cookie_consent') || 'null');
        if (c && c.value === 'accepted' && c.version === '1') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) {}
      gtag('config', 'G-DVVQ3D5M6Z', { anonymize_ip: true });
    </script>

          { "@type": "HowToStep", "position": 3, "name": "Scan & install", "text": "After purchase, scan the QR code delivered to your email or shown in your account. Installation takes under 3 minutes." },

    <!-- Support chat widget (yah-chat / 別プロジェクト chat.yah.mobi)。#yah-chat-btn を注入し、
         各所の「Start a chat」ボタン(document.getElementById("yah-chat-btn").click())を有効化する。
         ※CSP(firebase.json) の script/connect/frame/img に chat.yah.mobi を許可済み。 -->
    <script id="yah-chat-widget-loader" src="https://chat.yah.mobi/widget.js" data-lang="en" defer></script>
    <script>
      // chat widget の初期言語をサイト言語に同期する。
      // widget.js は defer（＝このインライン script より後に実行）で data-lang を読むため、実行前に上書きできる。
      // 判定順: URLパス(/ko/ 等) → localStorage(i18nextLng)。既定は en（訪日外国人向け）。
      (function () {
        try {
          var m = location.pathname.match(/^\/(ko|zh-CN|zh-TW|th)(\/|$)/);
          var lang = m ? m[1] : (localStorage.getItem("i18nextLng") || "");
          if (/^(ko|zh-CN|zh-TW|th|en)$/.test(lang)) {
            document.getElementById("yah-chat-widget-loader").setAttribute("data-lang", lang);
          }
        } catch (e) { /* 失敗時は data-lang="en" のまま */ }
      })();
    </script>

  <body>
    <div id="root">
      <!-- Fast Initial Paint (FCP Optimization) -->

        .initial-loader {
          position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;

        }
        .spinner {
          width: 24px; height: 24px; border: 2px solid rgba(255, 255, 255, 0.2);
          border-top-color: #fff; border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
